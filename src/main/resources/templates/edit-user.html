<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3rem 0;
            margin-bottom: 2rem;
        }

        .role-option {
            display: none;
        }
        .role-option + label {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.65rem 1rem;
            border: 1.5px solid #dee2e6;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-weight: 500;
            color: #495057;
            user-select: none;
        }
        .role-option + label:hover {
            border-color: #667eea;
            color: #667eea;
            background: #f5f5ff;
        }
        .role-option:checked + label {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .role-option:checked + label .role-icon {
            color: white;
        }
        .role-icon {
            font-size: 1.1rem;
            color: #6c757d;
            transition: color 0.15s;
        }

        .readonly-field {
            background-color: #f8f9fa;
            cursor: not-allowed;
            color: #6c757d;
        }
    </style>
</head>
<body>

<div class="hero-section">
    <div class="container">
        <h1 class="display-4 mb-3">
            <i class="bi bi-person-gear"></i>
            Edit User — <span th:text="${user.username}">username</span>
        </h1>
        <p class="lead">Update account status and roles</p>
    </div>
</div>

<div class="container mt-3">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/admin/users">Users</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${user.username}">username</li>
        </ol>
    </nav>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-body p-4">
                    <form th:action="@{/admin/users/update}" th:object="${user}" method="post">


                        <input type="hidden" th:field="*{username}">


                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="bi bi-person"></i> Username
                            </label>
                            <input type="text" class="form-control readonly-field"
                                   th:value="${user.username}" readonly tabindex="-1">
                            <div class="form-text">Username cannot be changed.</div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="bi bi-lock"></i> New password
                            </label>
                            <input type="password" class="form-control" th:field="*{password}">
                            <div class="form-text">Leave blank to keep the current password.</div>
                        </div>

                        <!-- Status -->
                        <div class="mb-4">
                            <label class="form-label fw-bold d-block">
                                <i class="bi bi-toggle-on"></i> Account status
                            </label>
                            <div class="form-check form-switch d-flex align-items-center gap-3 ps-0">
                                <input class="form-check-input ms-0" style="width: 3em; height: 1.5em; cursor: pointer;"
                                       type="checkbox" role="switch" id="enabledSwitch"
                                       th:field="*{enabled}">
                                <label class="form-check-label fw-normal" for="enabledSwitch" id="switchLabel"
                                       th:text="${user.enabled} ? 'Enabled' : 'Disabled'">
                                    Enabled
                                </label>
                            </div>
                        </div>

                        <!-- Roles -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">
                                <i class="bi bi-shield"></i> Roles
                            </label>
                            <div class="d-flex flex-wrap gap-2">
                                <div>
                                    <input type="checkbox" class="role-option" id="role-user"
                                           name="roles" value="ROLE_USER"
                                           th:checked="${currentRoles != null and currentRoles.contains('ROLE_USER')}">
                                    <label for="role-user">
                                        <i class="bi bi-person role-icon"></i> User
                                    </label>
                                </div>
                                <div>
                                    <input type="checkbox" class="role-option" id="role-staff"
                                           name="roles" value="ROLE_STAFF"
                                           th:checked="${currentRoles != null and currentRoles.contains('ROLE_STAFF')}">
                                    <label for="role-staff">
                                        <i class="bi bi-person-badge role-icon"></i> Staff
                                    </label>
                                </div>
                                <div>
                                    <input type="checkbox" class="role-option" id="role-manager"
                                           name="roles" value="ROLE_MANAGER"
                                           th:checked="${currentRoles != null and currentRoles.contains('ROLE_MANAGER')}">
                                    <label for="role-manager">
                                        <i class="bi bi-shield-fill-check role-icon"></i> Manager
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary btn-lg flex-grow-1">
                                <i class="bi bi-floppy"></i> Save changes
                            </button>
                            <a href="/admin/users" class="btn btn-outline-secondary btn-lg">
                                <i class="bi bi-x-circle"></i> Cancel
                            </a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const toggle = document.getElementById('enabledSwitch');
    const label  = document.getElementById('switchLabel');
    toggle.addEventListener('change', () => {
        label.textContent = toggle.checked ? 'Enabled' : 'Disabled';
    });
</script>
</body>
</html>
