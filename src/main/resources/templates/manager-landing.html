<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
        }

        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3rem 0 3.5rem;
        }

        .manager-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .welcome-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 0.2rem;
        }

        .welcome-heading {
            font-size: 1.6rem;
            font-weight: 500;
            margin: 0;
            color: #fff;
        }

        .welcome-subtext {
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.95rem;
            margin-top: 1.25rem;
            margin-bottom: 2rem;
        }

        .action-card {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 14px;
            padding: 1.5rem 1.25rem;
            color: white;
            text-decoration: none;
            display: block;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            height: 100%;
        }

        .action-card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            color: white;
            text-decoration: none;
        }

        .action-card:active {
            transform: translateY(0);
        }

        .action-icon {
            font-size: 1.75rem;
            display: block;
            margin-bottom: 0.85rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .action-title {
            font-size: 1rem;
            font-weight: 500;
            margin: 0 0 0.3rem;
        }

        .action-subtitle {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin: 0;
        }

        .navbar-brand-text {
            font-size: 1rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-shop-window"></i>
            <span class="navbar-brand-text text-white" th:text="#{universal.store}">Store</span>
        </div>
        <div class="d-flex align-items-center gap-2 text-light" style="font-size: 0.9rem;">
            <i class="bi bi-person-circle"></i>
            <span sec:authentication="name">username</span>
        </div>
    </div>
</nav>

<div class="hero-section">
    <div class="container">

        <div class="d-flex align-items-center gap-3 mb-0">
            <div class="manager-avatar">
                <i class="bi bi-person-fill"></i>
            </div>
            <div>
                <p class="welcome-label">Manager portal</p>
                <h1 class="welcome-heading">
                    Welcome, <span sec:authentication="name">username</span>
                </h1>
            </div>
        </div>

        <p class="welcome-subtext">What would you like to do today?</p>

        <div class="row g-3">
            <div class="col-12 col-md-4">
                <a th:href="@{/admin/users}" href="#" class="action-card">
                    <i class="bi bi-people-fill action-icon"></i>
                    <p class="action-title">User CRUD</p>
                    <p class="action-subtitle">Create, edit &amp; remove users</p>
                </a>
            </div>
            <div class="col-12 col-md-4">
                <a th:href="@{/admin/dashboard}" href="#" class="action-card">
                    <i class="bi bi-bar-chart-fill action-icon"></i>
                    <p class="action-title">Dashboard analytics</p>
                    <p class="action-subtitle">View metrics &amp; trends</p>
                </a>
            </div>
            <div class="col-12 col-md-4">
                <a th:href="@{/admin/reports/sales}" href="#" class="action-card">
                    <i class="bi bi-file-earmark-bar-graph-fill action-icon"></i>
                    <p class="action-title">Generate sales report</p>
                    <p class="action-subtitle">Export &amp; download reports</p>
                </a>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
