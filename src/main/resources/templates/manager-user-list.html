<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User list</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    .hero-section {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 3rem 0;
      margin-bottom: 2rem;
    }
    .language-switcher {
      display: flex;
      gap: 0.5rem;
    }
    .lang-btn {
      padding: 0.5rem 1rem;
      text-decoration: none;
      color: #495057;
      background: white;
      border: 2px solid #dee2e6;
      border-radius: 8px;
      transition: all 0.3s ease;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .lang-btn:hover {
      background: #f8f9fa;
      border-color: #667eea;
      color: #667eea;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(102, 126, 234, 0.2);
    }
    .lang-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-color: #667eea;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .users-table th {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6c757d;
      border-bottom: 2px solid #dee2e6;
      padding: 0.75rem 1rem;
    }
    .users-table td {
      padding: 0.85rem 1rem;
      vertical-align: middle;
    }
    .user-row {
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .user-row:hover td {
      background-color: #f0f1ff;
    }
    .user-row:hover .username {
      color: #667eea;
    }
    .username {
      font-family: monospace;
      font-weight: 600;
      font-size: 0.95rem;
      transition: color 0.15s ease;
    }

    .badge-enabled  { background-color: #d1e7dd; color: #0a3622; }
    .badge-disabled { background-color: #f8d7da; color: #58151c; }

    .badge-role-staff  { background-color: #cfe2ff; color: #084298; }
    .badge-role-admin  { background-color: #e2d9f3; color: #3d1a78; }
    .badge-role-user   { background-color: #e2e3e5; color: #41464b; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/catalog/welcome">
      <i class="bi bi-shop"></i>
      <span th:text="#{universal.store}"></span>
    </a>
    <div class="language-switcher">
      <a th:href="@{''(lang=en)}"
         th:classappend="${#locale.language=='en'?'active':''}"
         class="lang-btn">
        🇬🇧 English
      </a>
      <a th:href="@{''(lang=de)}"
         th:classappend="${#locale.language=='de'?'active':''}"
         class="lang-btn">
        🇩🇪 Deutsch
      </a>
    </div>
    <a th:href="@{/catalog/cart/view}" class="btn btn-outline-light btn-sm">
      <i class="bi bi-cart3"></i>
      <span th:text="#{universal.cart}"></span>
    </a>
  </div>
</nav>

<div class="hero-section">
  <div class="container">
    <h1 class="display-4 mb-3">
      <i class="bi bi-people"></i>
      <span>Users</span>
    </h1>
    <p class="lead">Browse and manage all registered users.</p>
    <a th:href="@{/admin/users/new}" class="btn btn-success w-100 mt-2">
      <i class="bi bi-person-plus"></i>
      <span>Add user</span>
    </a>
  </div>
</div>

<div class="container mb-5">
  <div class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table users-table mb-0">
        <thead>
          <tr>
            <th>
              <i class="bi bi-person"></i>
              <span>Username</span>
            </th>
            <th>
              <i class="bi bi-toggle-on"></i>
              <span>Status</span>
            </th>
            <th>
              <i class="bi bi-shield"></i>
              <span>Roles</span>
            </th>
            <th>
              <i class="bi bi-gear"></i>
              <span>Actions</span>
            </th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="user : ${users}" class="user-row">
            <td>
              <span class="username" th:text="${user.getUsername()}">johndoe</span>
            </td>
            <td>
              <span class="badge"
                    th:classappend="${user.getEnabled() ? 'badge-enabled' : 'badge-disabled'}"
                    th:text="${user.getEnabled() ? 'ENABLED' : 'DISABLED'}"
              >
                Enabled
              </span>
            </td>
            <td>
              <span th:each="role : ${user.getRoles()}"
                    class="badge me-1"
                    th:classappend="${role.getCssClass()}"
                    th:text="${role.getAuthority()}"
              >
                ROLE
              </span>
            </td>
            <td>
              <a th:href="@{/admin/users/edit(username=${user.getUsername()})}" class="text-decoration-none">
                <button class="btn btn-sm btn-outline-primary me-1">
                  <i class="bi bi-pencil"></i>
                </button>
              </a>
              <form th:action="@{/admin/users/delete}" method="post" style="display: inline;">
                <input type="hidden" name="username" th:value="${user.getUsername()}">
                <button class="btn btn-sm btn-outline-danger" type="submit">
                  <i class="bi bi-trash"></i>
                </button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
