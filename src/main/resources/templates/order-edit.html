<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Order</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    /* ── Shared ── */
    .hero-section {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 3rem 0;
      margin-bottom: 2rem;
    }
    .language-switcher {
      display: flex;
      gap: 0.5rem;
    }
    .lang-btn {
      padding: 0.5rem 1rem;
      text-decoration: none;
      color: #495057;
      background: white;
      border: 2px solid #dee2e6;
      border-radius: 8px;
      transition: all 0.3s ease;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .lang-btn:hover {
      background: #f8f9fa;
      border-color: #667eea;
      color: #667eea;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(102, 126, 234, 0.2);
    }
    .lang-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-color: #667eea;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    /* ── Status badges ── */
    .badge-pending   { background-color: #fff3cd; color: #856404; }
    .badge-shipped   { background-color: #cfe2ff; color: #084298; }
    .badge-delivered { background-color: #d1e7dd; color: #0a3622; }
    .badge-cancelled { background-color: #f8d7da; color: #58151c; }

    /* ── Receipt table ── */
    .receipt-table th {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6c757d;
      border-bottom: 2px solid #dee2e6;
      padding: 0.75rem 1rem;
    }
    .receipt-table td {
      padding: 0.85rem 1rem;
      vertical-align: middle;
    }
    .product-name {
      font-weight: 600;
    }
    .text-right {
      text-align: right;
    }

    /* ── Quantity input ── */
    .qty-input {
      width: 90px;
      border-radius: 8px;
      border: 2px solid #dee2e6;
      padding: 0.35rem 0.6rem;
      font-size: 0.95rem;
      text-align: right;
      margin-left: auto;
      display: block;
      transition: border-color 0.2s;
    }
    .qty-input:focus {
      border-color: #667eea;
      outline: none;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }

    /* ── Grand total row ── */
    .total-row td {
      border-top: 2px solid #dee2e6;
      font-weight: 700;
      font-size: 1.05rem;
      padding: 1rem 1rem;
      background-color: #f8f9fa;
    }

    /* ── Status footer ── */
    .status-footer {
      padding: 1.25rem 1.5rem;
      border-top: 1px solid #dee2e6;
      background-color: #f8f9fa;
      border-radius: 0 0 0.375rem 0.375rem;
    }

    /* Status row: current badge + dropdown side by side */
    .status-row {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .status-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6c757d;
      margin-bottom: 0.25rem;
    }
    .status-select {
      border-radius: 8px;
      border: 2px solid #dee2e6;
      padding: 0.4rem 0.75rem;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }
    .status-select:focus {
      border-color: #667eea;
      outline: none;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }

    /* Big update button on its own row */
    .btn-update-order {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.85rem 2.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn-update-order:hover {
      opacity: 0.92;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.35);
    }

    /* ── Hero order meta ── */
    .order-meta {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      margin-top: 1rem;
      font-size: 0.95rem;
      opacity: 0.9;
    }
    .order-meta span {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
  </style>
</head>
<body>


<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/catalog/welcome">
      <i class="bi bi-shop"></i>
      <span th:text="#{universal.store}"></span>
    </a>
    <div class="language-switcher">
      <a th:href="@{''(id=${param.id}, lang='en')}"
         th:classappend="${#locale.language=='en'?'active':''}"
         class="lang-btn">
        🇬🇧 English
      </a>
      <a th:href="@{''(id=${param.id}, lang='de')}"
         th:classappend="${#locale.language=='de'?'active':''}"
         class="lang-btn">
        🇩🇪 Deutsch
      </a>
    </div>
    <a th:href="@{/catalog/cart/view}" class="btn btn-outline-light btn-sm">
      <i class="bi bi-cart3"></i>
      <span th:text="#{universal.cart}"></span>
    </a>
  </div>
</nav>


<div class="hero-section">
  <div class="container">
    <h1 class="display-4 mb-2">
      <i class="bi bi-pencil-square"></i>
      <span th:text="#{order.order}">Order</span>
      <span style="font-family:monospace">#<span th:text="${order.getId()}">999</span></span>
    </h1>
    <div class="order-meta">
      <span><i class="bi bi-person"></i> <span th:text="${order.getUsername()}">jane.doe</span></span>
      <span><i class="bi bi-calendar-event"></i> <span th:text="${order.getFormattedDate()}">01 Jan 2025</span></span>
    </div>
  </div>
</div>


<div class="container mb-5">
  <div class="card shadow-sm">
    <div class="card-body p-0">

      <form th:action="@{/orders/update}" method="post" th:object="${order}">


        <input type="hidden" name="orderId" th:field="*{id}"/>
        <input type="hidden" name="orderUsername" th:field="*{username}"/>
        <input type="hidden" name="orderDate" th:field="*{date}"/>

        <table class="table receipt-table mb-0">
          <thead>
            <tr>
              <th>
                <i class="bi bi-box-seam"></i>
                <span th:text="#{order.product}">Product</span>
              </th>
              <th class="text-right">
                <i class="bi bi-currency-euro"></i>
                <span th:text="#{order.price}">Unit Price</span>
              </th>
              <th class="text-right">
                <i class="bi bi-stack"></i>
                <span th:text="#{order.quantity}">Qty</span>
              </th>
              <th class="text-right">
                <i class="bi bi-calculator"></i>
                <span th:text="#{order.total}">Total</span>
              </th>
            </tr>
          </thead>

          <tbody>
            <tr th:each="item, i : *{orderedItems}">

              <td class="product-name" th:text="${item.getProductName()}">Product Name</td>


              <td class="text-right" th:text="${item.getProductPrice()} + '€'">9.99€</td>


              <td class="text-right">
                <input type="number"
                       class="qty-input"
                       min="0"
                       th:field="*{orderedItems[__${i.index}__].quantity}"
                />

                <input type="hidden" th:field="*{orderedItems[__${i.index}__].product.id}" />
              </td>


              <td class="text-right" th:text="${item.getSubtotal()} + '€'">99.99€</td>
            </tr>


            <tr class="total-row">
              <td colspan="3" class="text-right" th:text="#{order.grand}">Grand Total</td>
              <td class="text-right" th:text="${order.getGrandTotal()} + '€'">127.46€</td>
            </tr>
          </tbody>
        </table>


        <div class="status-footer" sec:authorize="hasRole('ROLE_STAFF')">


          <div class="status-row">


            <div>
              <div class="status-label" th:text="#{order.status}">Current status</div>
              <span class="badge fs-6"
                    th:classappend="${order.getShippingStatusClass()}"
                    th:text="#{${'shipping.status.' + order.getShippingStatus()}}">
                Pending
              </span>
            </div>


            <div>
              <div class="status-label" th:text="#{orderEdit.newStatus}">New status</div>
              <select name="newStatus" class="status-select" th:field="*{shippingStatus}">
                <option th:each="status : ${T(hr.algebra.jsmalc.online_retial_project.domain.ShippingStatus).values()}"
                        th:value="${status}"
                        th:text="#{${'shipping.status.' + status}}"
                >
                </option>
              </select>
            </div>
          </div>


          <div>
            <button type="submit" class="btn-update-order">
              <i class="bi bi-arrow-repeat"></i>
              <span th:text="#{orderEdit.updateOrder}">Update Order</span>
            </button>
          </div>

        </div>


      </form>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
