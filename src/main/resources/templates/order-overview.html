<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order overview</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    /* ── Copied from welcome.html ── */
    .hero-section {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 3rem 0;
      margin-bottom: 2rem;
    }
    .language-switcher {
      display: flex;
      gap: 0.5rem;
    }
    .lang-btn {
      padding: 0.5rem 1rem;
      text-decoration: none;
      color: #495057;
      background: white;
      border: 2px solid #dee2e6;
      border-radius: 8px;
      transition: all 0.3s ease;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .lang-btn:hover {
      background: #f8f9fa;
      border-color: #667eea;
      color: #667eea;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(102, 126, 234, 0.2);
    }
    .lang-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-color: #667eea;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    /* ── Orders table ── */
    .orders-table th {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6c757d;
      border-bottom: 2px solid #dee2e6;
      padding: 0.75rem 1rem;
    }
    .orders-table td {
      padding: 0.85rem 1rem;
      vertical-align: middle;
    }
    .order-row {
      cursor: pointer;
      transition: background 0.15s ease;
      text-decoration: none;
      color: inherit;
      display: table-row;
    }
    .order-row:hover td {
      background-color: #f0f1ff;
    }
    .order-row:hover .order-id {
      color: #667eea;
    }
    .order-id {
      font-family: monospace;
      font-weight: 600;
      font-size: 0.95rem;
      transition: color 0.15s ease;
    }

    /* ── Status badges ── */
    .badge-pending   { background-color: #fff3cd; color: #856404; }
    .badge-shipped   { background-color: #cfe2ff; color: #084298; }
    .badge-delivered { background-color: #d1e7dd; color: #0a3622; }
    .badge-cancelled { background-color: #f8d7da; color: #58151c; }

    /* ── Placeholder highlight ── */
    /*
     * Any element with [th:text] or [sec:authentication] that still shows
     * placeholder text is wrapped in .placeholder-value for visibility
     * during development. Remove this style block once Thymeleaf is wired up.
     */
    .placeholder-value {
      background: repeating-linear-gradient(
              45deg,
              rgba(255, 193, 7, 0.15),
              rgba(255, 193, 7, 0.15) 4px,
              transparent 4px,
              transparent 10px
      );
      border: 1px dashed #ffc107;
      border-radius: 4px;
      padding: 0 4px;
      font-style: italic;
      color: #856404 !important;
    }
  </style>
</head>
<body>


<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a href="#" class="navbar-user-link d-flex align-items-center gap-2 text-decoration-none text-light me-3">
      <i class="bi bi-person-circle fs-5"></i>
      <span class="navbar-user-name" sec:authentication="name"></span>
    </a>
    <i class="bi bi-shop-window"></i>
    <span class="navbar-brand mb-0 h5" th:text="#{universal.store}"></span>
    <div class="language-switcher">
      <a th:href="@{?lang=en}"
         th:classappend="${#locale.language=='en'?'active':''}"
         class="lang-btn">
        🇬🇧 English
      </a>
      <a th:href="@{?lang=de}"
         th:classappend="${#locale.language=='de'?'active':''}"
         class="lang-btn">
        🇩🇪 Deutsch
      </a>
    </div>
    <a th:href="@{/catalog/cart/view}" class="btn btn-outline-light btn-sm">
      <i class="bi bi-cart3"></i>
      <span th:text="#{universal.cart}"></span>
    </a>
  </div>
</nav>

<div class="hero-section">
  <div class="container">
    <h1 class="display-4 mb-3">
      <i class="bi bi-receipt"></i>
      <!-- TODO: wire up → th:text="#{orders.title}" -->
      <span class="placeholder-value">Orders</span>
    </h1>
    <!-- TODO: wire up → th:text="#{orders.pitch}" -->
    <p class="lead placeholder-value">Browse and manage all customer orders.</p>
  </div>
</div>


<div class="container mb-5">
  <div class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table orders-table mb-0">
        <thead>
        <tr>
          <th><i class="bi bi-hash"></i> Order ID</th>
          <th><i class="bi bi-person"></i> Customer</th>
          <th><i class="bi bi-calendar-event"></i> Date</th>
          <th><i class="bi bi-box-seam"></i> Status</th>
          <!-- Visible to admins only -->
          <!-- TODO: wrap in sec:authorize="hasRole('ROLE_ADMIN')" -->
          <th><i class="bi bi-currency-euro"></i> Total</th>
          <th></th>
        </tr>
        </thead>
        <tbody>
        <!--
            TODO: replace this block with:
            <tr th:each="order : ${orders}" …>

            The three sample rows below are static placeholders.
            Delete them once the Thymeleaf loop is wired up.
        -->

        <!-- Sample row 1 -->
        <tr class="order-row"
            onclick="window.location='#'"
            th:onclick="|window.location='@{/orders/{id}(id=${order.id})}'|">
          <td>
            <span class="order-id placeholder-value">#00412</span>
          </td>
          <td class="placeholder-value">Anna Kowalski</td>
          <td class="placeholder-value">Jun 8, 2026</td>
          <td>
            <!-- TODO: th:classappend based on order.status -->
            <span class="badge badge-delivered placeholder-value">Delivered</span>
          </td>
          <td class="placeholder-value">€129.99</td>
          <td class="text-end">
            <!-- TODO: th:href="@{/orders/{id}(id=${order.id})}" -->
            <a href="#" class="btn btn-sm btn-outline-primary">
              <i class="bi bi-eye"></i> View
            </a>
          </td>
        </tr>

        <!-- Sample row 2 -->
        <tr class="order-row"
            onclick="window.location='#'"
            th:onclick="|window.location='@{/catalog/orders/{id}(id=${order.id})}'|">
          <td>
            <span class="order-id placeholder-value">#00411</span>
          </td>
          <td class="placeholder-value">Marco Rossi</td>
          <td class="placeholder-value">Jun 7, 2026</td>
          <td>
            <span class="badge badge-shipped placeholder-value">Shipped</span>
          </td>
          <td class="placeholder-value">€54.50</td>
          <td class="text-end">
            <a href="#" class="btn btn-sm btn-outline-primary">
              <i class="bi bi-eye"></i> View
            </a>
          </td>
        </tr>

        <!-- Sample row 3 -->
        <tr class="order-row"
            onclick="window.location='#'"
            th:onclick="|window.location='@{/catalog/orders/{id}(id=${order.id})}'|">
          <td>
            <span class="order-id placeholder-value">#00410</span>
          </td>
          <td class="placeholder-value">Lena Müller</td>
          <td class="placeholder-value">Jun 5, 2026</td>
          <td>
            <span class="badge badge-pending placeholder-value">Pending</span>
          </td>
          <td class="placeholder-value">€210.00</td>
          <td class="text-end">
            <a href="#" class="btn btn-sm btn-outline-primary">
              <i class="bi bi-eye"></i> View
            </a>
          </td>
        </tr>

        </tbody>
      </table>
    </div>
  </div>

  <!-- Empty state — shown when ${orders} is empty -->
  <!-- TODO: th:if="${#lists.isEmpty(orders)}" -->
  <div class="text-center text-muted py-5 d-none">
    <i class="bi bi-inbox fs-1"></i>
    <p class="mt-2">No orders yet.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
