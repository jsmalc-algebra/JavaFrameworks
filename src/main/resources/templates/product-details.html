<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' - Product Details'">Product Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .product-image-placeholder {
            height: 400px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }
        .price-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: #28a745;
        }
        .detail-card {
            border-left: 4px solid #667eea;
        }
        .quantity-control {
            width: 80px;
        }
        .language-switcher {
            display: flex;
            gap: 0.5rem;
        }
        .lang-btn {
            padding: 0.5rem 1rem;
            text-decoration: none;
            color: #495057;
            background: white;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .lang-btn:hover {
            background: #f8f9fa;
            border-color: #667eea;
            color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.2);
        }
        .lang-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body>
<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/products">
            <i class="bi bi-shop"></i>
            <span th:text="#{universal.store}"></span>
        </a>
        <div class="language-switcher">
            <a th:href="@{''(id=${param.id}, lang='en')}"
               th:classappend="${#locale.language=='en'?'active':''}"
               class="lang-btn">
                🇬🇧 English
            </a>
            <a th:href="@{''(id=${param.id}, lang='de')}"
               th:classappend="${#locale.language=='de'?'active':''}"
               class="lang-btn">
                🇩🇪 Deutsch
            </a>
        </div>
        <button class="btn btn-outline-light btn-sm">
            <i class="bi bi-cart3"></i>
            <span th:text="#{universal.cart}"></span>
        </button>
    </div>
</nav>

<!-- Breadcrumb -->
<div class="container mt-3">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/catalog/welcome" th:text="#{details.products}"></a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${product.name}">Product</li>
        </ol>
    </nav>
</div>

<!-- Product Details -->
<div class="container my-5">
    <div class="row">
        <!-- Product Image -->
        <div class="col-md-6 mb-4">
            <div class="d-flex align-items-center justify-content-center rounded"
                 style="height: 400px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                <div class="text-white text-center">
                    <div style="font-size: 8rem; font-weight: bold;"
                         th:text="${#strings.substring(product.name, 0, 1)}">P</div>
                    <h4 th:text="${product.manufacturer}">Manufacturer</h4>
                </div>
            </div>
        </div>


        <!-- Product Info -->
        <div class="col-md-6">
            <h1 class="display-5 mb-3" th:text="${product.name}">Product Name</h1>

            <div class="mb-3">
                    <span class="badge bg-primary me-2">
                        <i class="bi bi-building"></i>
                        <span th:text="${product.manufacturer}">Manufacturer</span>
                    </span>
                <span class="badge bg-secondary">
                        <i class="bi bi-rulers"></i>
                        <span th:text="${product.size}">Size</span>
                    </span>
            </div>

            <hr>

            <!-- Price -->
            <div class="price-display mb-4" th:text="'€' + ${product.price}">€0.00</div>

            <!-- Quantity & Add to Cart -->
            <div class="mb-4">
                <label class="form-label fw-bold" th:text="#{details.quantity}"></label>
                <div class="input-group mb-3" style="max-width: 200px;">
                    <input type="number" class="form-control text-center quantity-control" value="1" min="1">
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="d-grid gap-2">
                <button class="btn btn-primary btn-lg">
                    <i class="bi bi-cart-plus"></i>
                    <span th:text="#{universal.addToCart}"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- Product Details Tabs -->
    <div class="row mt-5">
        <div class="col-12">
            <ul class="nav nav-tabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" data-bs-toggle="tab"
                            data-bs-target="#specifications" type="button" th:text="#{details.specifications}">
                    </button>
                </li>
            </ul>

            <div class="tab-content p-4 border border-top-0">
                <!-- Specifications Tab -->
                <div class="tab-pane fade show active" id="specifications" role="tabpanel">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="card detail-card mb-3">
                                <div class="card-body">
                                    <p class="mb-1"><strong th:text="#{details.manuf}"></strong> <span th:text="${product.manufacturer}">N/A</span></p>
                                    <p class="mb-1"><strong th:text="#{details.size}"></strong> <span th:text="${product.size}">N/A</span></p>
                                    <p class="mb-0"><strong th:text="#{details.price}"></strong> <span th:text="'€' + ${product.price}">€0.00</span></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
