<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Edit Product</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
 <style>
  .hero-section {
   background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
   color: white;
   padding: 3rem 0;
   margin-bottom: 2rem;
  }
 </style>
</head>
<body>
<!-- Hero Section -->
<div class="hero-section">
 <div class="container">
  <h1 class="display-4 mb-3">
   <i class="bi bi-pencil-square"></i> Edit Product
  </h1>
  <p class="lead">Update product information</p>
 </div>
</div>

<!-- Breadcrumb -->
<div class="container mt-3">
 <nav aria-label="breadcrumb">
  <ol class="breadcrumb">
   <li class="breadcrumb-item"><a href="/catalog/welcome">Products</a></li>
   <li class="breadcrumb-item active" aria-current="page">Edit</li>
  </ol>
 </nav>
</div>

<!-- Edit Form -->
<div class="container mb-5">
 <div class="row justify-content-center">
  <div class="col-lg-8">
   <div class="card shadow">
    <div class="card-body p-4">
     <form th:action="@{/catalog/update}" th:object="${product}" method="post">

      <!-- Product ID (Read-only) -->
      <div class="mb-3">
       <label class="form-label fw-bold">
        <i class="bi bi-hash"></i> Product ID
       </label>
       <input type="text" class="form-control" th:field="*{id}" readonly style="background-color: #e9ecef;">
      </div>

      <!-- Product Name -->
      <div class="mb-3">
       <label class="form-label fw-bold">
        <i class="bi bi-tag"></i> Product Name
       </label>
       <input type="text" class="form-control" th:field="*{name}" required>
      </div>

      <!-- Manufacturer -->
      <div class="mb-3">
       <label class="form-label fw-bold">
        <i class="bi bi-building"></i> Manufacturer
       </label>
       <input type="text" class="form-control" th:field="*{manufacturer}" required>
      </div>

      <!-- Size -->
      <div class="mb-3">
       <label class="form-label fw-bold">
        <i class="bi bi-rulers"></i> Size
       </label>
       <input type="text" class="form-control" th:field="*{size}" required>
      </div>

      <!-- Price -->
      <div class="mb-4">
       <label class="form-label fw-bold">
        Price (<i class="bi bi-currency-euro"></i>)
       </label>
       <input type="number" step="0.01" class="form-control" th:field="*{price}" required>
      </div>


      <!-- Action Buttons -->
      <div class="d-flex gap-2">
       <button type="submit" class="btn btn-primary btn-lg flex-grow-1">
        <i class="bi bi-check-circle"></i> Update Product
       </button>
       <a href="/catalog/welcome" class="btn btn-outline-secondary btn-lg">
        <i class="bi bi-x-circle"></i> Cancel
       </a>
      </div>
     </form>
    </div>
   </div>
  </div>
 </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
