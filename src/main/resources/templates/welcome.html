<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .product-card {
            transition: transform 0.2s, box-shadow 0.2s;
            height: 100%;
            color: #212529;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        .price-tag {
            font-size: 1.5rem;
            font-weight: bold;
            color: #28a745;
        }
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3rem 0;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
<!-- Hero Section -->
<div class="hero-section">
    <div class="container">
        <h1 class="display-4 mb-3">
            <i class="bi bi-shop"></i> Product Catalog
        </h1>
        <p class="lead">Browse our extensive collection of products</p>
        <a href="/catalog/newProductScreen" class="btn btn-success w-100">
            <i class="bi bi-plus-circle"></i> Add Product
        </a>
    </div>
</div>


    <!-- Product Grid -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div class="col" th:each="product : ${products}">
                <div class="card product-card">
                    <a th:href="@{/catalog/details(id=${product.id})}" class="text-decoration-none">
                        <!-- Product Initial Badge -->
                        <div class="d-flex align-items-center justify-content-center"
                             style="height: 200px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                            <div class="text-white text-center">
                                <div style="font-size: 4rem; font-weight: bold;"
                                     th:text="${#strings.substring(product.name, 0, 1)}">P</div>
                                <small th:text="${product.manufacturer}">Manufacturer</small>
                            </div>
                        </div>

                        <div class="card-body">
                            <!-- Product Name -->
                            <h5 class="card-title" th:text="${product.name}">Product Name</h5>

                            <!-- Manufacturer -->
                            <p class="text-muted mb-2">
                                <i class="bi bi-building"></i>
                                <small th:text="${product.manufacturer}">Manufacturer</small>
                            </p>

                            <!-- Size Badge -->
                            <span class="badge bg-secondary mb-3">
                                <i class="bi bi-rulers"></i>
                                <span th:text="${product.size}">Size</span>
                            </span>

                            <!-- Price and Action -->
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="price-tag" th:text="${product.price} + '€'">0.00€</span>
                                <button class="btn btn-primary">
                                    <i class="bi bi-cart-plus"></i> Add to Cart
                                </button>
                            </div>
                        </div>
                    </a>
                        <!-- Product ID Footer -->
                        <div class="card-footer d-flex justify-content-between align-items-center">
                            <small>ID: <span th:text="${product.id}">000</span></small>
                            <div>
                                <a th:href="@{/catalog/updateScreen(id=${product.id})}" class="text-decoration-none">
                                    <button class="btn btn-sm btn-outline-primary me-1">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                </a>
                                <form th:action="@{/catalog/deleteProduct}" method="post"
                                style="display:inline">
                                    <input type="hidden" name="id" th:value="${product.id}">
                                    <button class="btn btn-sm btn-outline-danger" type="submit">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
