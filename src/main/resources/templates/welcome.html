<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .product-card {
            transition: transform 0.2s, box-shadow 0.2s;
            height: 100%;
            color: #212529;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        .price-tag {
            font-size: 1.5rem;
            font-weight: bold;
            color: #28a745;
        }
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3rem 0;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
<!-- Hero Section -->
<div class="hero-section">
    <div class="container">
        <h1 class="display-4 mb-3">
            <i class="bi bi-shop"></i> Product Catalog
        </h1>
        <p class="lead">Browse our extensive collection of products</p>
    </div>
</div>

<!-- Main Content -->
<div class="container mb-5">
    <!-- Search and Filter Bar -->
    <div class="row mb-4">
        <div class="col-md-8">
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control" placeholder="Search products...">
            </div>
        </div>
        <div class="col-md-4">
            <select class="form-select">
                <option selected>Sort by...</option>
                <option>Price: Low to High</option>
                <option>Price: High to Low</option>
                <option>Name A-Z</option>
            </select>
        </div>
    </div>

    <!-- Product Grid -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div class="col" th:each="product : ${products}">
            <a th:href="@{/catalog/details(id=${product.id})}" class="text-decoration-none">
                <div class="card product-card">
                    <!-- Product Image Placeholder -->
                    <div class="bg-light d-flex align-items-center justify-content-center" style="height: 200px;">
                        <i class="bi bi-box-seam text-muted" style="font-size: 4rem;"></i>
                    </div>

                    <div class="card-body">
                        <!-- Product Name -->
                        <h5 class="card-title" th:text="${product.name}">Product Name</h5>

                        <!-- Manufacturer -->
                        <p class="text-muted mb-2">
                            <i class="bi bi-building"></i>
                            <small th:text="${product.manufacturer}">Manufacturer</small>
                        </p>

                        <!-- Size Badge -->
                        <span class="badge bg-secondary mb-3">
                            <i class="bi bi-rulers"></i>
                            <span th:text="${product.size}">Size</span>
                        </span>

                        <!-- Price and Action -->
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="price-tag" th:text="'$' + ${product.price}">$0.00</span>
                            <button class="btn btn-primary">
                                <i class="bi bi-cart-plus"></i> Add to Cart
                            </button>
                        </div>
                    </div>

                    <!-- Product ID Footer -->
                    <div class="card-footer text-muted">
                        <small>ID: <span th:text="${product.id}">000</span></small>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
