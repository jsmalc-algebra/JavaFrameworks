<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .product-card {
            transition: transform 0.2s, box-shadow 0.2s;
            height: 100%;
            color: #212529;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        .price-tag {
            font-size: 1.5rem;
            font-weight: bold;
            color: #28a745;
        }
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3rem 0;
            margin-bottom: 2rem;
        }
        .language-switcher {
            display: flex;
            gap: 0.5rem;
        }
        .lang-btn {
            padding: 0.5rem 1rem;
            text-decoration: none;
            color: #495057;
            background: white;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .lang-btn:hover {
            background: #f8f9fa;
            border-color: #667eea;
            color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.2);
        }
        .lang-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <i class="bi bi-shop-window"></i>
        <span class="navbar-brand mb-0 h5" th:text="#{universal.store}"></span>
        <div class="language-switcher">
            <a th:href="@{?lang=en}"
               th:classappend="${#locale.language=='en'?'active':''}"
               class="lang-btn">
                🇬🇧 English
            </a>
            <a th:href="@{?lang=de}"
               th:classappend="${#locale.language=='de'?'active':''}"
               class="lang-btn">
                🇩🇪 Deutsch
            </a>
        </div>
        <a th:href="@{/catalog/cart/view}" class="btn btn-outline-light btn-sm">
            <i class="bi bi-cart3"></i>
            <span th:text="#{universal.cart}"></span>
        </a>
    </div>
</nav>
<!-- Hero Section -->
<div class="hero-section">
    <div class="container">
        <h1 class="display-4 mb-3">
            <i class="bi bi-shop"></i>
            <span th:text="#{welcome.title}"></span>
        </h1>
        <p class="lead" th:text="#{welcome.pitch}"></p>
        <a href="/catalog/newProductScreen" class="btn btn-success w-100" sec:authorize="hasRole('ROLE_ADMIN')">
            <i class="bi bi-plus-circle"></i>
            <span th:text="#{welcome.add}"></span>
        </a>
        <div style="padding-block: 1%"></div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-danger btn-lg w-100">
                <i class="bi bi-box-arrow-right"></i>
                <span th:text="#{welcome.logout}"></span>
            </button>
        </form>
    </div>
</div>


    <!-- Product Grid -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div class="col" th:each="product : ${products}">
                <div class="card product-card">
                    <a th:href="@{/catalog/details(id=${product.id})}" class="text-decoration-none">
                        <!-- Product Initial Badge -->
                        <div class="d-flex align-items-center justify-content-center"
                             style="height: 200px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                            <div class="text-white text-center">
                                <div style="font-size: 4rem; font-weight: bold;"
                                     th:text="${#strings.substring(product.name, 0, 1)}">P</div>
                                <small th:text="${product.manufacturer}">Manufacturer</small>
                            </div>
                        </div>

                        <div class="card-body">
                            <!-- Product Name -->
                            <h5 class="card-title" th:text="${product.name}">Product Name</h5>

                            <!-- Manufacturer -->
                            <p class="text-muted mb-2">
                                <i class="bi bi-building"></i>
                                <small th:text="${product.manufacturer}">Manufacturer</small>
                            </p>

                            <!-- Size Badge -->
                            <span class="badge bg-secondary mb-3">
                                <i class="bi bi-rulers"></i>
                                <span th:text="${product.size}">Size</span>
                            </span>

                            <!-- Price and Action -->
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="price-tag" th:text="${product.price} + '€'">0.00€</span>
                                <form th:action="@{/catalog/cart/add}" method="post">
                                    <input type="hidden" name="productId" th:value="${product.id}">
                                    <input type="hidden" name="returnUrl" value="/catalog/welcome">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-cart-plus"></i>
                                        <span th:text="#{universal.addToCart}"></span>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </a>
                        <!-- Product ID Footer -->
                        <div class="card-footer d-flex justify-content-between align-items-center" sec:authorize="hasRole('ROLE_ADMIN')">
                            <small>
                                ID: <span th:text="${product.id}">000</span>
                                <span th:text="#{welcome.stock}">Stock quantity</span>
                                <span th:text="${product.currentStock}">999</span>
                            </small>
                            <div>
                                <a th:href="@{/catalog/updateScreen(id=${product.id})}" class="text-decoration-none">
                                    <button class="btn btn-sm btn-outline-primary me-1">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                </a>
                                <form th:action="@{/catalog/deleteProduct}" method="post"
                                style="display:inline">
                                    <input type="hidden" name="id" th:value="${product.id}">
                                    <button class="btn btn-sm btn-outline-danger" type="submit">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
